server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

security:
  jwt:
    secret: my-secret-key-my-secret-key-my-secret-key
    expiration: 3600000